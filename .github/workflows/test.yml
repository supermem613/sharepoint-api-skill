name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: node --test tests/test-scripts.js

  lint:
    name: Script Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Node.js scripts have shebang
        run: |
          for f in .claude/skills/sharepoint-api/scripts/*.js; do
            head -1 "$f" | grep -q 'node' || (echo "Missing node shebang: $f" && exit 1)
          done
          echo "All Node.js scripts have proper shebang"
      - name: Check bash wrappers have shebang
        run: |
          for f in .claude/skills/sharepoint-api/scripts/*.sh; do
            head -1 "$f" | grep -q '#!/bin/bash' || (echo "Missing shebang: $f" && exit 1)
          done
          echo "All bash scripts have proper shebang"
      - name: Check no trailing whitespace in markdown
        run: |
          if grep -rn ' $' .claude/skills/sharepoint-api/*.md .claude/skills/sharepoint-api/references/*.md 2>/dev/null; then
            echo "Found trailing whitespace in markdown files"
            exit 1
          fi
          echo "No trailing whitespace found"
      - name: Validate SKILL.md has frontmatter
        run: |
          head -1 .claude/skills/sharepoint-api/SKILL.md | grep -q '^---' || (echo "SKILL.md missing frontmatter" && exit 1)
          echo "SKILL.md has valid frontmatter"
