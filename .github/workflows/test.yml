name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-scripts-windows:
    name: Script Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PowerShell tests
        shell: pwsh
        run: ./tests/test-scripts.ps1

  test-scripts-linux:
    name: Script Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make scripts executable
        run: chmod +x .claude/skills/sharepoint-api/scripts/*.sh tests/*.sh
      - name: Run bash tests
        run: ./tests/test-scripts.sh

  lint:
    name: Script Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check bash scripts have shebang
        run: |
          for f in .claude/skills/sharepoint-api/scripts/*.sh; do
            head -1 "$f" | grep -q '#!/bin/bash' || (echo "Missing shebang: $f" && exit 1)
          done
          echo "All bash scripts have proper shebang"
      - name: Check no trailing whitespace in markdown
        run: |
          if grep -rn ' $' .claude/skills/sharepoint-api/*.md .claude/skills/sharepoint-api/references/*.md 2>/dev/null; then
            echo "Found trailing whitespace in markdown files"
            exit 1
          fi
          echo "No trailing whitespace found"
      - name: Validate SKILL.md has frontmatter
        run: |
          head -1 .claude/skills/sharepoint-api/SKILL.md | grep -q '^---' || (echo "SKILL.md missing frontmatter" && exit 1)
          echo "SKILL.md has valid frontmatter"
